server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — no /api proxying. Caddy is the sole ingress for /api/*
  # (SLICE-2 drift D4 closure). The previous /api/* and /api/v1/traces*
  # location blocks were deleted on 2026-05-26.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
