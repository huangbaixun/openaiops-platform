name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - name: go mod download
        run: cd backend && go mod download
      - name: go vet
        run: cd backend && go vet ./...
      - name: go test (unit)
        run: cd backend && go test -count=1 -timeout 120s ./...
      - name: go test (integration — dockertest spins PG)
        run: cd backend && go test -tags=integration -count=1 -timeout 240s ./internal/auth/...

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build
      - run: cd frontend && npx vitest run

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.25' }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: install frontend deps + playwright browsers
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: generate seed hashes (Go bcrypt) and patch seed.sql
        run: |
          cd backend
          ACME_HASH=$(go run ./cmd/seed-hash test-key-acme)
          BETA_HASH=$(go run ./cmd/seed-hash test-key-beta)
          echo "ACME_HASH=$ACME_HASH"
          echo "BETA_HASH=$BETA_HASH"
          cd ../deploy
          # Replace placeholder hashes (assume existing values are real bcrypt strings from earlier commit — replace them)
          # Use python to safely substitute since bcrypt strings have $ signs.
          python3 - <<EOF
          import re, sys
          with open('seed.sql') as f:
              content = f.read()
          # Replace acme key hash
          content = re.sub(r"('acme-primary',\s*)'[^']*'", lambda m: m.group(1) + "'$ACME_HASH'", content)
          content = re.sub(r"('beta-primary',\s*)'[^']*'", lambda m: m.group(1) + "'$BETA_HASH'", content)
          with open('seed.sql', 'w') as f:
              f.write(content)
          EOF
          # Verify substitution
          grep -E "acme-primary|beta-primary" deploy/seed.sql

      - name: docker-compose up
        run: |
          cd deploy
          docker compose up -d --build

      - name: wait for healthchecks (up to 3 min)
        run: |
          cd deploy
          for i in $(seq 1 36); do
            healthy=$(docker compose ps --format json | jq -s '[.[] | select(.Status | contains("healthy"))] | length')
            exited=$(docker compose ps --format json | jq -s '[.[] | select(.Status | contains("Exited (0)"))] | length')
            echo "iter $i: $healthy healthy, $exited completed"
            if [ "$healthy" -ge 5 ] && [ "$exited" -ge 1 ]; then
              echo "stack ready"
              break
            fi
            sleep 5
          done
          docker compose ps

      - name: seed PG
        run: |
          cd deploy
          docker compose exec -T postgres psql -U openaiops -d openaiops < seed.sql

      - name: e2e
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report

      - name: stack logs on failure
        if: failure()
        run: |
          cd deploy
          docker compose logs --tail=200
